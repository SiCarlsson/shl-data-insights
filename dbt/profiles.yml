shl_data_insights:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5437') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'shl_user') }}"
      pass: "{{ env_var('POSTGRES_PASSWORD', 'shl_dev_password') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'shl_data_db') }}"
      schema: "{{ env_var('DBT_DEV_SCHEMA', 'reference') }}"
      threads: 4
      sslmode: prefer

    prod:
      type: postgres
      host: "{{ env_var('SUPABASE_DB_HOST') }}"
      port: "{{ env_var('SUPABASE_DB_PORT', '5432') | int }}"
      user: "{{ env_var('SUPABASE_DB_USER', 'postgres') }}"
      pass: "{{ env_var('SUPABASE_DB_PASSWORD') }}"
      dbname: "{{ env_var('SUPABASE_DB_NAME', 'postgres') }}"
      schema: "{{ env_var('DBT_PROD_SCHEMA', 'reference') }}"
      threads: 4
      sslmode: require
