extends: default

rules:
  document-start: disable 
  indentation:
    spaces: 2
    indent-sequences: false
  line-length:
    max: 120
    level: error
  truthy:
    allowed-values: ["true", "false"] 
    check-keys: false
  comments:
    min-spaces-from-content: 1
  braces:
    max-spaces-inside: 1
  brackets:
    max-spaces-inside: 1
